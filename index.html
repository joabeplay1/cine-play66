<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine Play & Chat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');

    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--border:#222;
      --primary:#e53e3e;--primary-dark:#c53030;
      --text:#f0f0f0;--text-muted:#888;--radius:12px;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    /* NAVBAR */
    .navbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);cursor:pointer;border:none;background:none;}
    .logo-icon{width:36px;height:36px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
    .logo-text{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;}
    .navbar-actions{display:flex;gap:8px;align-items:center;}

    /* BOTÃO DO CHAT */
    .btn-chat {
      background: #25d366; /* Verde para destacar o chat */
      color: #fff;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s;
    }
    .btn-chat:hover { transform: scale(1.05); }

    /* Estilos do restante do Cine Play (Resumido para o exemplo) */
    .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .login-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:400px;text-align:center;}
    .login-btn{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:10px;cursor:pointer;margin-top:10px;}
    .main{max-width:1280px;margin:0 auto;padding:24px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
    .card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:10px;}
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    // --- CONFIGURAÇÃO FIREBASE (CHAT) ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getDatabase, ref, push, serverTimestamp, query, orderByChild, endAt, get, remove } 
    from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

    const firebaseConfig = {
      databaseURL: "https://bate-papo-6da76-default-rtdb.firebaseio.com/" // SUA URL AQUI
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const mensagensRef = ref(db, 'mensagens');

    // --- LÓGICA DO CINE PLAY ---
    const ACCESS_PASSWORD = 'cineplay123';
    let videos = []; // Seus vídeos aqui

    function isLoggedIn() { return sessionStorage.getItem('cp_auth') === '1'; }

    // Função para limpar mensagens antigas (20 min)
    async function limparChat() {
      const vinteMinutosatras = Date.now() - (20 * 60 * 1000);
      const consulta = query(mensagensRef, orderByChild('horario'), endAt(vinteMinutosatras));
      const snapshot = await get(consulta);
      if (snapshot.exists()) {
        snapshot.forEach((child) => remove(ref(db, `mensagens/${child.key}`)));
      }
    }

    window.renderHome = function() {
      if (!isLoggedIn()) { renderLogin(); return; }
      
      // Limpa o chat toda vez que abre a home
      limparChat();

      document.getElementById('app').innerHTML = `
        <nav class="navbar">
          <div class="logo">
            <div class="logo-icon">🎬</div><span class="logo-text">Cine Play</span>
          </div>
          <div class="navbar-actions">
            <a href="https://joabeplay1.github.io/bate-papo/" class="btn-chat">💬 Abrir Chat</a>
            <button class="login-btn" style="width:auto; padding:8px 15px" onclick="sessionStorage.removeItem('cp_auth'); renderLogin();">Sair</button>
          </div>
        </nav>
        <div class="main">
          <h2>Bem-vindo ao Cine Play</h2>
          <p style="color:gray">O chat agora limpa mensagens a cada 20 minutos!</p>
          <div class="grid" id="grid"></div>
        </div>
      `;
    };

    window.renderLogin = function() {
      document.getElementById('app').innerHTML = `
        <div class="login-page">
          <div class="login-box">
            <h2>Cine Play</h2>
            <input type="password" id="pass" placeholder="Senha" style="width:100%; padding:10px; margin-top:10px">
            <button class="login-btn" onclick="checkPass()">Entrar</button>
          </div>
        </div>
      `;
    };

    window.checkPass = function() {
      if (document.getElementById('pass').value === ACCESS_PASSWORD) {
        sessionStorage.setItem('cp_auth', '1');
        renderHome();
      } else { alert('Senha errada!'); }
    };

    // Iniciar
    if (isLoggedIn()) renderHome(); else renderLogin();

  </script>
</body>
</html>
