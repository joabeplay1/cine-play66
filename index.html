<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine Play - Oficial</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Space+Grotesk:wght@500;700&display=swap');

    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0a0a0a; --bg2:#111111; --bg3:#1a1a1a; --border:#222;
      --primary:#e53e3e; --text:#f0f0f0; --text-muted:#888; --radius:12px;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    /* NAVBAR */
    .navbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;}
    .logo{display:flex;align-items:center;gap:10px;cursor:pointer;}
    .logo-icon{width:36px;height:36px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
    .search-input{background:var(--bg2);border:1px solid var(--border);padding:8px 15px;border-radius:20px;color:white;width:300px;outline:none;}

    /* LAYOUT DUAS COLUNAS */
    .main-container {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      gap: 24px;
    }

    /* ÁREA DE CONTEÚDO (VÍDEOS) */
    .content-area { flex: 1; }

    .category-bar { display: flex; gap: 10px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 5px; }
    .cat-tag { background: var(--bg2); padding: 6px 15px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; }
    .cat-tag.active { background: var(--primary); border-color: var(--primary); }

    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .movie-card { background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: 0.3s; }
    .movie-card:hover { transform: translateY(-5px); border-color: var(--primary); }
    .thumb { aspect-ratio: 16/9; background: #222; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .movie-info { padding: 12px; font-weight: 600; font-size: 14px; }

    /* BARRA LATERAL (CHAT) */
    .sidebar-chat {
      width: 360px;
      height: calc(100vh - 110px);
      position: sticky;
      top: 84px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .chat-header {
      padding: 15px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: bold;
    }
    .chat-header span { color: var(--primary); }
    .chat-iframe { flex: 1; border: none; width: 100%; }

    /* RESPONSIVIDADE */
    @media (max-width: 1000px) {
      .main-container { flex-direction: column; }
      .sidebar-chat { width: 100%; height: 500px; position: static; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <div class="logo-icon">🎬</div>
      <strong style="font-family:'Space Grotesk'">Cine Play</strong>
    </div>
    <input type="text" class="search-input" placeholder="Buscar filmes...">
    <button onclick="location.reload()" style="background:var(--bg3); color:white; border:none; padding:8px 15px; border-radius:10px; cursor:pointer">Sair</button>
  </nav>

  <div class="main-container">
    
    <main class="content-area">
      <div class="category-bar">
        <div class="cat-tag active">Todos</div>
        <div class="cat-tag">✨ Anime</div>
        <div class="cat-tag">😂 Comédia</div>
      </div>

      <div class="video-grid">
        <div class="movie-card">
          <div class="thumb"><img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400"></div>
          <div class="movie-info">NARUTO VS SASUKE</div>
        </div>
        </div>
    </main>

    <aside class="sidebar-chat">
      <div class="chat-header">
        <span>●</span> Bate-Papo Cine Play
      </div>
      <iframe src="https://joabeplay1.github.io/bate-papo/" class="chat-iframe"></iframe>
    </aside>

  </div>

</body>
</html>
