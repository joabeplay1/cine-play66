<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine Play</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--border:#222;
      --primary:#e53e3e;--primary-dark:#c53030;
      --text:#f0f0f0;--text-muted:#888;--radius:12px;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    
    /* LOGIN PAGE */
    .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);}
    .login-box{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:400px;text-align:center;box-shadow: 0 20px 50px rgba(0,0,0,0.5);}
    .login-logo{width:64px;height:64px;background:var(--primary);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px;box-shadow: 0 0 20px rgba(229,62,62,0.4);}
    .login-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;margin-bottom:8px;}
    .login-sub{color:var(--text-muted);font-size:14px;margin-bottom:32px;}
    .google-btn-container { display: flex; justify-content: center; margin-top: 10px; }

    /* Estilos do App (Mantidos do seu original) */
    .navbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);cursor:pointer;border:none;background:none;}
    .logo-icon{width:36px;height:36px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
    .logo-text{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;}
    .btn-add{background:var(--primary);color:#fff;border:none;padding:8px 18px;border-radius:999px;font-weight:600;font-size:14px;cursor:pointer;transition:background .2s;}
    .main{max-width:1280px;margin:0 auto;padding:24px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
    .card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .2s;}
    .card:hover{border-color:var(--primary);transform:translateY(-4px);}
    .card-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;}
    .card-thumb img{width:100%;height:100%;object-fit:cover;}
    .badge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.7);color:#fff;font-size:10px;padding:3px 8px;border-radius:6px;}
    .logout-btn{background:var(--bg3);color:var(--text-muted);border:1px solid var(--border);padding:6px 14px;border-radius:999px;font-size:12px;cursor:pointer;}
    
    /* MODAL & PLAYER (Omitidos aqui por brevidade, mas funcionais no script) */
    .hidden{display:none;}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;}
    .modal{background:var(--bg2);padding:28px;border-radius:16px;width:90%;max-width:500px;}
    .player-wrap{width:100%;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden;}
    iframe{width:100%;height:100%;border:none;}
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // Configurações e Dados
    const GOOGLE_CLIENT_ID = "1052704350848-cq5vcrbfd23o6t2747b2j8i57lpfu2j1.apps.googleusercontent.com";
    
    let videos = [
        { id: 1, title: "Interestelar", category: "filme", source: "youtube", video_url: "https://www.youtube.com/watch?v=zSWdZVtXT7E" },
        { id: 2, title: "Alok Copacabana", category: "musica_ao_vivo", source: "youtube", video_url: "https://www.youtube.com/live/87WPtTcOTFk" }
    ];

    // ── LÓGICA DE AUTENTICAÇÃO ───────────────────────────────────
    function isLoggedIn() { return sessionStorage.getItem('cp_auth') === '1'; }

    function handleCredentialResponse(response) {
      if (response.credential) {
        // O Google validou o usuário!
        sessionStorage.setItem('cp_auth', '1');
        renderHome();
      }
    }

    function doLogout() {
      sessionStorage.removeItem('cp_auth');
      location.reload(); // Recarrega para voltar à tela de login
    }

    // ── TELAS ──────────────────────────────────────────────────
    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="login-page">
          <div class="login-box">
            <div class="login-logo">🎬</div>
            <div class="login-title">Cine Play</div>
            <div class="login-sub">Para sua segurança, entre com sua conta Google para acessar o catálogo.</div>
            
            <div class="google-btn-container">
                <div id="g_id_onload"
                     data-client_id="${GOOGLE_CLIENT_ID}"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin" 
                     data-type="standard" 
                     data-shape="pill" 
                     data-theme="filled_blue" 
                     data-text="signin_with" 
                     data-size="large" 
                     data-logo_alignment="left">
                </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderHome() {
      if (!isLoggedIn()) { renderLogin(); return; }
      
      document.getElementById('app').innerHTML = `
        <nav class="navbar">
          <div class="logo">
            <div class="logo-icon">🎬</div><span class="logo-text">Cine Play</span>
          </div>
          <div class="navbar-actions">
            <button class="btn-add" onclick="alert('Função de adicionar em breve!')">+ Adicionar</button>
            <button class="logout-btn" onclick="doLogout()">Sair</button>
          </div>
        </nav>
        <div class="main">
          <div class="grid" id="gridWrap">
            ${videos.map(v => `
              <div class="card" onclick="playVideo('${v.video_url}')">
                <div class="card-thumb">
                  <img src="https://img.youtube.com/vi/${getYTId(v.video_url)}/hqdefault.jpg" />
                  <span class="badge">${v.category}</span>
                </div>
                <div style="padding:12px"><strong>${v.title}</strong></div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function playVideo(url) {
        const id = getYTId(url);
        document.getElementById('app').innerHTML = `
            <div style="padding:20px"><button class="logout-btn" onclick="renderHome()">← Voltar</button></div>
            <div class="main">
                <div class="player-wrap">
                    <iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>
                </div>
            </div>
        `;
    }

    function getYTId(url) {
      const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&?\s]+)/);
      return m ? m[1] : "";
    }

    // Inicialização
    window.onload = () => {
        if (isLoggedIn()) renderHome();
        else renderLogin();
    };
  </script>
</body>
</html>
