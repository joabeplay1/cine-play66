<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine Play</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');

    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--border:#222;
      --primary:#e53e3e;--primary-dark:#c53030;
      --text:#f0f0f0;--text-muted:#888;--radius:12px;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:var(--bg2);}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}

    /* LOGIN */
    .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .login-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:400px;text-align:center;}
    .login-logo{width:56px;height:56px;background:var(--primary);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;}
    .login-title{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;margin-bottom:6px;}
    .login-sub{color:var(--text-muted);font-size:14px;margin-bottom:28px;}
    .login-input{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;outline:none;margin-bottom:12px;}
    .login-input:focus{border-color:var(--primary);}
    .login-btn{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;margin-top:4px;}
    .login-btn:hover{background:var(--primary-dark);}
    .login-error{color:#f87171;font-size:13px;margin-top:10px;display:none;}

    /* NAVBAR & SIDEBAR CUSTOM */
    .navbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);cursor:pointer;border:none;background:none;}
    .logo-icon{width:36px;height:36px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
    .logo-text{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;}
    .search-wrap{flex:1;max-width:420px;position:relative;}
    .search-wrap input{width:100%;padding:8px 16px 8px 40px;background:var(--bg2);border:1px solid var(--border);border-radius:999px;color:var(--text);font-size:14px;outline:none;}
    .search-wrap input:focus{border-color:var(--primary);}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5;}
    .navbar-actions{display:flex;gap:8px; align-items: center;}

    /* MENU ITEM ESTILO SIDEBAR */
    .menu-item { padding: 8px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 999px; color: var(--text); font-weight: 500; font-size: 13px; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px; }
    .menu-item:hover { border-color: var(--primary); color: var(--primary); }

    .btn-karaoke{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:8px 14px;border-radius:999px;font-weight:500;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;}
    .btn-karaoke:hover{border-color:var(--primary);color:var(--primary);}

    /* GRID & CARDS */
    .main{max-width:1280px;margin:0 auto;padding:24px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
    .card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s;}
    .card:hover{border-color:rgba(229,62,62,.4);transform:translateY(-2px);}
    .card-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;}
    .card-thumb img{width:100%;height:100%;object-fit:cover;}
    .card-body{padding:12px 14px;}
    .card-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;line-height:1.4;}

    /* MODAL DO JOGO */
    #game-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:99999; flex-direction:column; }
    .game-header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:#1a1a1a; border-bottom:1px solid #333; }
    #game-iframe { flex:1; width:100%; height:calc(100% - 50px); border:none; }

    @media(max-width:600px){
      .grid{grid-template-columns:repeat(2,1fr);}
      .logo-text{display:none;}
    }
  </style>
</head>
<body>

  <div id="particles-js" style="position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1;"></div>
  <div id="app"></div>

  <div id="game-modal">
    <div class="game-header">
      <span style="color:#fff; font-size:18px; font-weight:bold;">🀫 Dominó</span>
      <button onclick="fecharJogo()" style="background:#e53935; color:#fff; border:none; border-radius:8px; padding:8px 18px; font-size:15px; cursor:pointer;">✕ Fechar</button>
    </div>
    <iframe id="game-iframe" src=""></iframe>
  </div>

  <script>
    const ACCESS_PASSWORD = 'cineplay123';
    
    // Dados simulados baseados no seu código
    let videos = [
      { id: "1", title: "Tomorrowland Brasil 2025", category: "musica_ao_vivo", thumbnail_url: "https://base44.app/api/apps/69c40e1fd9cca13236f6ac8c/files/mp/public/69c40e1fd9cca13236f6ac8c/2953e0169_alok22.mp4", source: "google_drive" },
      { id: "2", title: "Sasuke Uchiha e Killer Bee", category: "animacao", thumbnail_url: "https://base44.app/api/apps/69c40e1fd9cca13236f6ac8c/files/mp/public/69c40e1fd9cca13236f6ac8c/413022005_Gemini_Generated_Image_h9k6r6h9k6r6h9k6.png", source: "google_drive" }
    ];

    function isLoggedIn() { return sessionStorage.getItem('cp_auth') === '1'; }

    function doLogin() {
      const val = document.getElementById('loginPass')?.value;
      if (val === ACCESS_PASSWORD) {
        sessionStorage.setItem('cp_auth', '1');
        renderHome();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="login-page">
          <div class="login-box">
            <div class="login-logo">🎬</div>
            <div class="login-title">Cine Play</div>
            <input class="login-input" type="password" id="loginPass" placeholder="Senha de acesso" />
            <button class="login-btn" onclick="doLogin()">Entrar</button>
            <div class="login-error" id="loginError">Senha incorreta.</div>
          </div>
        </div>`;
    }

    function renderHome() {
      if (!isLoggedIn()) { renderLogin(); return; }
      document.getElementById('app').innerHTML = `
        <nav class="navbar">
          <div class="logo">
            <div class="logo-icon">🎬</div><span class="logo-text">Cine Play</span>
          </div>
          <div class="search-wrap">
            <input type="text" placeholder="Buscar filmes..." />
          </div>
          <div class="navbar-actions">
            <div class="menu-item" onclick="abrirJogo('https://joabeplay1.github.io/domino-9999/')" style="cursor:pointer;">
              🀫 Dominó
            </div>
            <button class="btn-karaoke" onclick="alert('Bíblia em breve')">📖 Bíblia</button>
            <button class="btn-karaoke" onclick="alert('Ferramentas em breve')">🔧 Ferramentas</button>
          </div>
        </nav>
        <div class="main">
          <div class="grid" id="grid"></div>
        </div>`;
      
      const grid = document.getElementById('grid');
      videos.forEach(v => {
        grid.innerHTML += `
          <div class="card">
            <div class="card-thumb"><img src="${v.thumbnail_url.includes('.mp4') ? 'https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=600' : v.thumbnail_url}"></div>
            <div class="card-body"><div class="card-title">${v.title}</div></div>
          </div>`;
      });
    }

    // FUNÇÕES DO JOGO DOMINÓ
    function abrirJogo(url) {
      const modal = document.getElementById('game-modal');
      const iframe = document.getElementById('game-iframe');
      iframe.src = url;
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden'; // Trava o scroll da página ao jogar
    }

    function fecharJogo() {
      const modal = document.getElementById('game-modal');
      const iframe = document.getElementById('game-iframe');
      iframe.src = ''; // Limpa o iframe para parar o som/processamento
      modal.style.display = 'none';
      document.body.style.overflow = 'auto'; // Libera o scroll
    }

    // Inicialização
    if (isLoggedIn()) renderHome(); else renderLogin();
  </script>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    particlesJS("particles-js", {
      "particles": {
        "number": { "value": 50 },
        "color": { "value": "#e53e3e" },
        "shape": { "type": "circle" },
        "opacity": { "value": 0.3 },
        "size": { "value": 3 },
        "line_linked": { "enable": true, "color": "#e53e3e", "opacity": 0.2 },
        "move": { "enable": true, "speed": 2 }
      }
    });
  </script>
</body>
</html>
