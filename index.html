<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine Play - Oficial</title>
  
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');
    
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--border:#222;
      --primary:#e53e3e;--primary-dark:#c53030;
      --text:#f0f0f0;--text-muted:#888;--radius:12px;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

    /* TELA DE LOGIN */
    .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);}
    .login-box{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,0.5);}
    .login-logo{width:64px;height:64px;background:var(--primary);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px;box-shadow:0 0 20px rgba(229,62,62,0.4);}
    .login-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;margin-bottom:8px;}
    .login-sub{color:var(--text-muted);font-size:14px;margin-bottom:32px;line-height:1.5;}
    .google-btn-wrapper { display: flex; justify-content: center; width: 100%; margin-top: 10px; }

    /* NAVBAR */
    .navbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;}
    .logo-link{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);}
    .logo-icon{width:36px;height:36px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
    .logo-text{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;}

    /* CONTEUDO */
    .main{max-width:1280px;margin:0 auto;padding:24px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;}
    .card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all 0.3s ease;}
    .card:hover{border-color:var(--primary);transform:translateY(-5px);}
    .card-thumb{position:relative;aspect-ratio:16/9;background:#000;}
    .card-thumb img{width:100%;height:100%;object-fit:cover;}
    .card-info{padding:15px;}
    .card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:5px;}
    
    .btn-logout{background:var(--bg3);color:var(--text-muted);border:1px solid var(--border);padding:8px 16px;border-radius:20px;cursor:pointer;font-size:12px;}
    .btn-logout:hover{color:var(--primary);border-color:var(--primary);}

    .player-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .video-frame { width: 100%; aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>

  <div id="app"></div>

  <script>
    // --- CONFIGURAÇÃO ---
    const CLIENT_ID = "1052704350848-cq5vcrbfd23o6t2747b2j8i57lpfu2j1.apps.googleusercontent.com";
    
    // Lista de Vídeos (Você pode adicionar mais aqui)
    let videos = [
      { id: 1, title: "Jesus Reina - Ao Vivo", url: "https://www.youtube.com/watch?v=87WPtTcOTFk", thumb: "https://img.youtube.com/vi/87WPtTcOTFk/maxresdefault.jpg" },
      { id: 2, title: "Soldado de Jesus", url: "https://www.youtube.com/watch?v=pS25Yx6gehk", thumb: "https://img.youtube.com/vi/pS25Yx6gehk/maxresdefault.jpg" },
      { id: 3, title: "Interestelar - Trailer", url: "https://www.youtube.com/watch?v=zSWdZVtXT7E", thumb: "https://img.youtube.com/vi/zSWdZVtXT7E/maxresdefault.jpg" }
    ];

    // --- FUNÇÕES DE LOGIN ---
    function handleCredentialResponse(response) {
      if (response.credential) {
        // Salva o login no navegador
        sessionStorage.setItem('cineplay_session', 'ativo');
        renderHome();
      }
    }

    function checkLogin() {
      return sessionStorage.getItem('cineplay_session') === 'ativo';
    }

    function logout() {
      sessionStorage.removeItem('cineplay_session');
      location.reload();
    }

    // --- RENDERIZAÇÃO DAS TELAS ---
    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="login-page">
          <div class="login-box">
            <div class="login-logo">🎬</div>
            <h1 class="login-title">Cine Play</h1>
            <p class="login-sub">Para sua segurança, entre com sua conta Google para acessar o catálogo de vídeos.</p>
            
            <div class="google-btn-wrapper">
              <div id="g_id_onload"
                   data-client_id="${CLIENT_ID}"
                   data-callback="handleCredentialResponse"
                   data-auto_prompt="false">
              </div>
              <div class="g_id_signin" 
                   data-type="standard" 
                   data-shape="pill" 
                   data-theme="filled_blue" 
                   data-text="signin_with" 
                   data-size="large" 
                   data-logo_alignment="left">
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderHome() {
      document.getElementById('app').innerHTML = `
        <nav class="navbar">
          <a href="#" class="logo-link" onclick="renderHome()">
            <div class="logo-icon">🎬</div>
            <span class="logo-text">Cine Play</span>
          </a>
          <button class="btn-logout" onclick="logout()">Sair da Conta</button>
        </nav>
        
        <div class="main">
          <h2 style="margin-bottom: 20px;">Destaques para você</h2>
          <div class="grid">
            ${videos.map(v => `
              <div class="card" onclick="playVideo('${v.url}')">
                <div class="card-thumb">
                  <img src="${v.thumb}" alt="${v.title}">
                </div>
                <div class="card-info">
                  <div class="card-title">${v.title}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function playVideo(videoUrl) {
      const videoId = videoUrl.split('v=')[1]?.split('&')[0];
      document.getElementById('app').innerHTML = `
        <nav class="navbar">
          <button class="btn-logout" onclick="renderHome()">← Voltar ao Início</button>
        </nav>
        <div class="player-container">
          <div class="video-frame">
            <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" allowfullscreen allow="autoplay"></iframe>
          </div>
        </div>
      `;
    }

    // --- INICIALIZAÇÃO ---
    window.onload = () => {
      if (checkLogin()) {
        renderHome();
      } else {
        renderLogin();
      }
    };
  </script>
</body>
</html>
